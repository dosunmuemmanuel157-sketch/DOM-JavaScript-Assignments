<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Library Management System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>📚 Library Management System</h1>
  <p>Add, borrow, and return books with ease</p>
</header>

<div class="layout">

  <!-- Add Book Panel -->
  <div class="panel">
    <h2>Add New Book</h2>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="inTitle" placeholder="e.g. Things Fall Apart" />
    </div>
    <div class="form-group">
      <label>Author</label>
      <input type="text" id="inAuthor" placeholder="e.g. Chinua Achebe" />
    </div>
    <div class="form-group">
      <label>Year</label>
      <input type="number" id="inYear" placeholder="e.g. 1958" min="1000" max="2100" />
    </div>
    <button class="btn btn-gold" onclick="handleAdd()">Add Book</button>
  </div>

  <!-- Stats Panel -->
  <div class="panel">
    <h2>Library Stats</h2>
    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">Total Books</div>
      </div>
      <div class="stat">
        <div class="stat-num green" id="statAvail">0</div>
        <div class="stat-label">Available</div>
      </div>
      <div class="stat">
        <div class="stat-num red" id="statBorrow">0</div>
        <div class="stat-label">Borrowed</div>
      </div>
    </div>

    <h2 class="mt">Available Books</h2>
    <div id="availList"><p class="empty">No books available yet.</p></div>
  </div>

  <!-- All Books Panel -->
  <div class="panel books-panel">
    <h2>All Books</h2>
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('available', this)">Available</button>
      <button class="filter-btn" onclick="setFilter('borrowed', this)">Borrowed</button>
    </div>
    <div id="bookList"><p class="empty">No books in the library yet. Add one above!</p></div>
  </div>

</div>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
