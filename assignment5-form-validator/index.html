<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="container">
    <h1>Registration Form</h1>

    <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username" oninput="validateUsername()">
        <p id="username-msg" class="msg"></p>
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" oninput="validatePassword()">

        <div class="show-password">
            <input type="checkbox" id="showPassword" onclick="togglePassword()">
            <label for="showPassword">Show Password</label>
        </div>

        <div id="password-checks">
            <p id="upper">❌ Uppercase Letter</p>
            <p id="lower">❌ Lowercase Letter</p>
            <p id="number">❌ Number</p>
            <p id="special">❌ Special Character</p>
            <p id="length">❌ Minimum 8 Characters</p>
        </div>

        <p id="password-msg" class="msg"></p>
    </div>

    <div class="form-group">
        <label>Phone Number</label>
        <input type="text" id="phone" placeholder="+2347012345678 or 07012345678" oninput="validatePhone()">
        <p id="phone-msg" class="msg"></p>
    </div>

    <button onclick="submitForm()">Register</button>

    <p id="form-msg" class="msg"></p>
</div>

<script src="script.js"></script>

</body>
</html>
